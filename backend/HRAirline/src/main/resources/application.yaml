spring:
  application:
    name: HRAirline
  datasource:
    url: jdbc:postgresql://localhost:5432/hrairline_db
    username: user1
    password: password1
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  sql:
    init:
      mode: always
      platform: postgres
server:
  port: 8082

app:
  jwt:
    # Fallback key used only for local development; always override in production
    secret-key: ${JWT_SECRET:474bd3d5f84b191febd7dfe467831f7801ce7f0e0403723225917a6764bb190f}
    expiration-ms: 1*24*60*60*1000L # 24 hours in milliseconds